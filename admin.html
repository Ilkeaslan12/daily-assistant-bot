<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="container">

        <h1>Admin Dashboard</h1>

        <div class="stats">

            <div class="card">
                <h2>Total Messages</h2>
                <p id="totalMessages">0</p>
            </div>

            <div class="card">
                <h2>Total Errors</h2>
                <p id="totalErrors">0</p>
            </div>

        </div>

        <section>

            <h2>Recent Chats</h2>

            <table>

                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User Message</th>
                        <th>Bot Response</th>
                    </tr>
                </thead>

                <tbody id="chatTable"></tbody>

            </table>

        </section>

        <section>

            <h2>Recent Errors</h2>

            <table>

                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Error Type</th>
                        <th>Error Message</th>
                    </tr>
                </thead>

                <tbody id="errorTable"></tbody>

            </table>

        </section>

    </div>

    <script src="admin.js"></script>

</body>
</html>
